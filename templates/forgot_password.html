{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="fw-bold text-center">Forgot Password</h2>
        <p class="text-muted text-center">Enter your registered email.</p>

        <form method="POST">
            {{ form.hidden_tag() }}

            <div class="mb-3">
                {{ form.email.label(class="form-label") }}
                {{ form.email(class="form-control") }}
            </div>

            {{ form.submit(class="btn btn-primary w-100 rounded-pill") }}
        </form>
    </div>
</div>

{% endblock %}
